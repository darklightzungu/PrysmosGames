name: Luau lint

on:
  pull_request:
    paths:
      - "roblox_games/**"
      - "selene.toml"
  push:
    branches: [main]
    paths:
      - "roblox_games/**"
      - "selene.toml"

permissions:
  contents: read

jobs:
  selene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Selene
        run: |
          SELENE_VERSION="0.27.1"
          curl -sSL "https://github.com/Kampfkarren/selene/releases/download/${SELENE_VERSION}/selene-${SELENE_VERSION}-linux.zip" -o selene.zip
          unzip -o selene.zip
          chmod +x selene
          sudo mv selene /usr/local/bin/selene
          selene --version

      - name: Lint roblox_games
        run: |
          if ! find roblox_games -type f \( -name '*.lua' -o -name '*.luau' \) | grep -q .; then
            echo "No Lua sources under roblox_games/ — skipping lint."
            exit 0
          fi
          selene roblox_games
